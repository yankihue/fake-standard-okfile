name: CI

on:
  push:
  pull_request:

jobs:
  conformance:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Verify canonical OK file
        run: okfile examples/valid.ok
      - name: Verify ceremony profile
        run: okfile --ceremony --rfc RFC-0001-OKFILE.md --vectors fixtures/vectors.json examples/valid.ok
